<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SQL · Solve the Code</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #050d1a;
      font-family: 'DM Sans', sans-serif;
      color: #e2eaf4;
      min-height: 100vh;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: linear-gradient(rgba(0,212,255,0.04) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(0,212,255,0.04) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      z-index: 0;
    }
    .container {
      position: relative;
      z-index: 1;
      max-width: 1400px;
      margin: 0 auto;
      padding: 2rem;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid rgba(0,212,255,0.15);
      margin-bottom: 2rem;
      flex-wrap: wrap;
      gap: 1rem;
    }
    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.8rem;
      background: linear-gradient(90deg, #fff, #00d4ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .back-btn {
      background: rgba(0,212,255,0.1);
      border: 1px solid #00d4ff;
      border-radius: 40px;
      padding: 0.5rem 1.3rem;
      color: #00d4ff;
      text-decoration: none;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.8rem;
      transition: all 0.2s;
    }
    .back-btn:hover {
      background: #00d4ff;
      color: #050d1a;
    }
    .game-panel {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2rem;
    }
    .code-section, .output-section {
      background: rgba(13,30,48,0.85);
      border: 1px solid rgba(0,212,255,0.15);
      border-radius: 20px;
      padding: 1.5rem;
      backdrop-filter: blur(16px);
    }
    .section-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.5rem;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .badge {
      background: rgba(0,212,255,0.2);
      padding: 0.2rem 0.7rem;
      border-radius: 20px;
      font-size: 0.7rem;
      font-family: 'JetBrains Mono', monospace;
    }
    textarea {
      width: 100%;
      height: 350px;
      background: #0a1424;
      border: 1px solid rgba(0,212,255,0.3);
      border-radius: 12px;
      padding: 1rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.85rem;
      color: #e2eaf4;
      resize: vertical;
    }
    textarea:focus {
      outline: none;
      border-color: #00d4ff;
    }
    .button-group {
      display: flex;
      gap: 1rem;
      margin-top: 1rem;
      flex-wrap: wrap;
    }
    .run-btn {
      background: linear-gradient(135deg, #00d4ff, #0068ff);
      border: none;
      border-radius: 10px;
      padding: 0.7rem 1.5rem;
      font-family: 'JetBrains Mono', monospace;
      font-weight: 600;
      color: #fff;
      cursor: pointer;
    }
    .hint-btn {
      background: rgba(245,158,11,0.2);
      border: 1px solid #f59e0b;
      border-radius: 10px;
      padding: 0.7rem 1.5rem;
      font-family: 'JetBrains Mono', monospace;
      color: #f59e0b;
      cursor: pointer;
    }
    .giveup-btn {
      background: rgba(255,107,107,0.2);
      border: 1px solid #ff6b6b;
      border-radius: 10px;
      padding: 0.7rem 1.5rem;
      font-family: 'JetBrains Mono', monospace;
      color: #ff6b6b;
      cursor: pointer;
    }
    .new-btn {
      background: transparent;
      border: 1px solid #00d4ff;
      border-radius: 10px;
      padding: 0.7rem 1.5rem;
      font-family: 'JetBrains Mono', monospace;
      color: #00d4ff;
      cursor: pointer;
    }
    .output {
      background: #0a1424;
      border-radius: 12px;
      padding: 1rem;
      min-height: 350px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.85rem;
      white-space: pre-wrap;
    }
    .error { color: #ff6b6b; }
    .success { color: #51cf66; }
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.8);
      z-index: 1000;
      justify-content: center;
      align-items: center;
    }
    .modal-content {
      background: #0d1e30;
      border: 1px solid #00d4ff;
      border-radius: 20px;
      padding: 2rem;
      max-width: 500px;
      margin: 1rem;
      text-align: center;
    }
    .modal-content button {
      margin-top: 1rem;
      padding: 0.5rem 1.5rem;
      background: #00d4ff;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }
    @media (max-width: 900px) {
      .game-panel { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="topbar">
    <div class="logo">🗄️ SQL · DEBUG ARENA</div>
    <a href="solvinggame.html" class="back-btn">← Change Language</a>
  </div>
  <div class="game-panel">
    <div class="code-section">
      <div class="section-title"><span>🗄️ FIX THE QUERY</span><span class="badge">easy mode</span></div>
      <textarea id="codeEditor" spellcheck="false"></textarea>
      <div class="button-group">
        <button class="run-btn" onclick="runCode()">▶ RUN QUERY</button>
        <button class="hint-btn" onclick="showHint()">💡 HINT</button>
        <button class="giveup-btn" onclick="giveUp()">🏳️ GIVE UP</button>
        <button class="new-btn" onclick="loadNewChallenge()">🎲 NEW</button>
      </div>
    </div>
    <div class="output-section">
      <div class="section-title"><span>📟 RESULT</span><span class="badge">query explanation</span></div>
      <div class="output" id="outputArea">// Write your SQL query and click RUN</div>
    </div>
  </div>
</div>

<div id="hintModal" class="modal">
  <div class="modal-content">
    <h3>💡 HINT</h3>
    <p id="hintMessage"></p>
    <button onclick="closeModal()">Got it!</button>
  </div>
</div>

<div id="answerModal" class="modal">
  <div class="modal-content">
    <h3>📖 SOLUTION</h3>
    <p id="answerMessage"></p>
    <button onclick="closeAnswerModal()">Try Next →</button>
  </div>
</div>

<script>
  const challenges = [
    {
      broken: `-- Fix: Select all users
SELECT * FORM users`,
      fixed: `SELECT * FROM users`,
      hint: "Spelling error! It's FROM, not FORM",
      expectedKeyword: "FROM"
    },
    {
      broken: `-- Fix: Select name and age
SELECT name age FROM students`,
      fixed: `SELECT name, age FROM students`,
      hint: "Missing comma between name and age",
      expectedKeyword: "name, age"
    },
    {
      broken: `-- Fix: Get users older than 18
SELECT * FROM users WHERE age > 18`,
      fixed: `SELECT * FROM users WHERE age > 18`,
      hint: "This query is actually correct! Just click RUN.",
      expectedKeyword: "WHERE"
    },
    {
      broken: `-- Fix: Order by name
SELECT * FROM products ORDER name`,
      fixed: `SELECT * FROM products ORDER BY name`,
      hint: "Missing BY after ORDER",
      expectedKeyword: "ORDER BY"
    },
    {
      broken: `-- Fix: Count all users
SELECT COUNT(*) FORM users`,
      fixed: `SELECT COUNT(*) FROM users`,
      hint: "FORM should be FROM",
      expectedKeyword: "FROM"
    }
  ];

  let currentChallenge = null;

  function loadNewChallenge() {
    const randomIndex = Math.floor(Math.random() * challenges.length);
    currentChallenge = challenges[randomIndex];
    document.getElementById('codeEditor').value = currentChallenge.broken;
    document.getElementById('outputArea').innerHTML = '// New challenge! Fix the SQL query and click RUN';
  }

  function runCode() {
    const code = document.getElementById('codeEditor').value;
    const outputDiv = document.getElementById('outputArea');
    
    const upperCode = code.toUpperCase();
    
    if (upperCode.includes(currentChallenge.expectedKeyword.toUpperCase())) {
      outputDiv.innerHTML = `<span class="success">✅ CORRECT! 🎉</span>\n\nYour query looks good!\n\n<span class="success">Great job! Click NEW for another challenge.</span>`;
    } else {
      outputDiv.innerHTML = `<span class="error">❌ Not quite right.</span>\n\nExpected to find keyword: "${currentChallenge.expectedKeyword}"\n\n<span>💡 Click HINT for help!</span>`;
    }
  }

  function showHint() {
    if (currentChallenge) {
      document.getElementById('hintMessage').innerHTML = currentChallenge.hint;
      document.getElementById('hintModal').style.display = 'flex';
    }
  }

  function giveUp() {
    if (currentChallenge) {
      document.getElementById('answerMessage').innerHTML = `<strong>The correct query is:</strong><br><br><code style="background:#1a2a3a; padding:0.5rem; display:block; border-radius:8px;">${currentChallenge.fixed}</code><br><br><strong>Key fix:</strong> ${currentChallenge.hint}`;
      document.getElementById('answerModal').style.display = 'flex';
    }
  }

  function closeModal() {
    document.getElementById('hintModal').style.display = 'none';
  }

  function closeAnswerModal() {
    document.getElementById('answerModal').style.display = 'none';
    loadNewChallenge();
  }

  loadNewChallenge();
</script>
</body>
</html>
