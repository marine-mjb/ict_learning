<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JavaScript · Solve the Code</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #050d1a;
      font-family: 'DM Sans', sans-serif;
      color: #e2eaf4;
      min-height: 100vh;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: linear-gradient(rgba(0,212,255,0.04) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(0,212,255,0.04) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      z-index: 0;
    }
    .container {
      position: relative;
      z-index: 1;
      max-width: 1400px;
      margin: 0 auto;
      padding: 2rem;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid rgba(0,212,255,0.15);
      margin-bottom: 2rem;
      flex-wrap: wrap;
      gap: 1rem;
    }
    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.8rem;
      background: linear-gradient(90deg, #fff, #00d4ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .back-btn {
      background: rgba(0,212,255,0.1);
      border: 1px solid #00d4ff;
      border-radius: 40px;
      padding: 0.5rem 1.3rem;
      color: #00d4ff;
      text-decoration: none;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.8rem;
      transition: all 0.2s;
    }
    .back-btn:hover {
      background: #00d4ff;
      color: #050d1a;
    }
    .game-panel {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2rem;
    }
    .code-section, .output-section {
      background: rgba(13,30,48,0.85);
      border: 1px solid rgba(0,212,255,0.15);
      border-radius: 20px;
      padding: 1.5rem;
      backdrop-filter: blur(16px);
    }
    .section-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.5rem;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .badge {
      background: rgba(0,212,255,0.2);
      padding: 0.2rem 0.7rem;
      border-radius: 20px;
      font-size: 0.7rem;
      font-family: 'JetBrains Mono', monospace;
    }
    textarea {
      width: 100%;
      height: 350px;
      background: #0a1424;
      border: 1px solid rgba(0,212,255,0.3);
      border-radius: 12px;
      padding: 1rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.85rem;
      color: #e2eaf4;
      resize: vertical;
    }
    textarea:focus {
      outline: none;
      border-color: #00d4ff;
    }
    .button-group {
      display: flex;
      gap: 1rem;
      margin-top: 1rem;
      flex-wrap: wrap;
    }
    .run-btn {
      background: linear-gradient(135deg, #00d4ff, #0068ff);
      border: none;
      border-radius: 10px;
      padding: 0.7rem 1.5rem;
      font-family: 'JetBrains Mono', monospace;
      font-weight: 600;
      color: #fff;
      cursor: pointer;
    }
    .hint-btn {
      background: rgba(245,158,11,0.2);
      border: 1px solid #f59e0b;
      border-radius: 10px;
      padding: 0.7rem 1.5rem;
      font-family: 'JetBrains Mono', monospace;
      color: #f59e0b;
      cursor: pointer;
    }
    .giveup-btn {
      background: rgba(255,107,107,0.2);
      border: 1px solid #ff6b6b;
      border-radius: 10px;
      padding: 0.7rem 1.5rem;
      font-family: 'JetBrains Mono', monospace;
      color: #ff6b6b;
      cursor: pointer;
    }
    .new-btn {
      background: transparent;
      border: 1px solid #00d4ff;
      border-radius: 10px;
      padding: 0.7rem 1.5rem;
      font-family: 'JetBrains Mono', monospace;
      color: #00d4ff;
      cursor: pointer;
    }
    .output {
      background: #0a1424;
      border-radius: 12px;
      padding: 1rem;
      min-height: 350px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.85rem;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .error { color: #ff6b6b; }
    .success { color: #51cf66; }
    .hint-text { color: #f59e0b; }
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.8);
      z-index: 1000;
      justify-content: center;
      align-items: center;
    }
    .modal-content {
      background: #0d1e30;
      border: 1px solid #00d4ff;
      border-radius: 20px;
      padding: 2rem;
      max-width: 500px;
      margin: 1rem;
      text-align: center;
    }
    .modal-content button {
      margin-top: 1rem;
      padding: 0.5rem 1.5rem;
      background: #00d4ff;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }
    @media (max-width: 900px) {
      .game-panel { grid-template-columns: 1fr; }
      .container { padding: 1rem; }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="topbar">
    <div class="logo">⚡ JAVASCRIPT · DEBUG ARENA</div>
    <a href="solvinggame.html" class="back-btn">← Change Language</a>
  </div>
  <div class="game-panel">
    <div class="code-section">
      <div class="section-title"><span>🔧 FIX THE CODE</span><span class="badge">easy mode</span></div>
      <textarea id="codeEditor" spellcheck="false"></textarea>
      <div class="button-group">
        <button class="run-btn" onclick="runCode()">▶ RUN CODE</button>
        <button class="hint-btn" onclick="showHint()">💡 HINT</button>
        <button class="giveup-btn" onclick="giveUp()">🏳️ GIVE UP</button>
        <button class="new-btn" onclick="loadNewChallenge()">🎲 NEW</button>
      </div>
    </div>
    <div class="output-section">
      <div class="section-title"><span>📟 OUTPUT</span><span class="badge">result</span></div>
      <div class="output" id="outputArea">// Click RUN to test your code</div>
    </div>
  </div>
</div>

<div id="hintModal" class="modal">
  <div class="modal-content">
    <h3>💡 HINT</h3>
    <p id="hintMessage"></p>
    <button onclick="closeModal()">Got it!</button>
  </div>
</div>

<div id="answerModal" class="modal">
  <div class="modal-content">
    <h3>📖 SOLUTION</h3>
    <p id="answerMessage"></p>
    <button onclick="closeAnswerModal()">Try Next →</button>
  </div>
</div>

<script>
  // ============================================================
  // UPDATED CHALLENGES: Real beginner errors (not just semicolons)
  // Includes: missing parentheses, mismatched brackets, undefined variables,
  // wrong assignment, typos in variable names, missing quotes, etc.
  // ============================================================
  const challenges = [
    {
      broken: `// 🐞 Fix me: print "Hello World" (missing parenthesis)
console.log("Hello World"`,
      fixed: `console.log("Hello World");`,
      hint: "🔍 Every opening parenthesis ( needs a closing ). Also add a semicolon at the end!",
      expectedOutput: "Hello World"
    },
    {
      broken: `// 🐞 Add two numbers and show result (missing semicolon + typo)
let num1 = 10
let num2 = 5
let total = num1 + num2
console.lg(total)`,
      fixed: `let num1 = 10;
let num2 = 5;
let total = num1 + num2;
console.log(total);`,
      hint: "⚠️ Two problems: missing semicolons AND console.lg should be console.log",
      expectedOutput: "15"
    },
    {
      broken: `// 🐞 Function should return "Hello Alex" (missing return semicolon & missing closing brace)
function greet(name) {
  return "Hello " + name
`,
      fixed: `function greet(name) {
  return "Hello " + name;
}
console.log(greet("Alex"));`,
      hint: "🧩 Missing closing curly brace } AND semicolon after return. Also need to call the function!",
      expectedOutput: "Hello Alex"
    },
    {
      broken: `// 🐞 Loop from 1 to 3 (missing curly braces + semicolon)
for (let i = 1; i <= 3; i++)
  console.log(i)
}`,
      fixed: `for (let i = 1; i <= 3; i++) {
  console.log(i);
}`,
      hint: "💡 The for loop needs { } to wrap the body, and a semicolon after console.log",
      expectedOutput: "1\n2\n3"
    },
    {
      broken: `// 🐞 Check positive number (undefined variable mistake)
let score = 10;
if (scor > 0) {
  console.log("Positive");
}`,
      fixed: `let score = 10;
if (score > 0) {
  console.log("Positive");
}`,
      hint: "✏️ Variable name typo: 'scor' is not defined. It should be 'score'",
      expectedOutput: "Positive"
    },
    {
      broken: `// 🐞 Create array and print second fruit (wrong bracket + missing semicolon)
let fruits = ["apple", "banana", "cherry"
console.log(fruits[1])`,
      fixed: `let fruits = ["apple", "banana", "cherry"];
console.log(fruits[1]);`,
      hint: "🔧 Missing closing ] for array AND missing semicolon. Check brackets carefully!",
      expectedOutput: "banana"
    },
    {
      broken: `// 🐞 Capitalize first letter (missing .toUpperCase parentheses)
let word = "cat";
let capitalized = word[0].toUpperCase + word.slice(1);
console.log(capitalized);`,
      fixed: `let word = "cat";
let capitalized = word[0].toUpperCase() + word.slice(1);
console.log(capitalized);`,
      hint: "⚠️ .toUpperCase is a method, needs parentheses () → .toUpperCase()",
      expectedOutput: "Cat"
    },
    {
      broken: `// 🐞 While loop (missing increment operator)
let count = 1;
while (count <= 3) {
  console.log(count);
  // missing count update!
}`,
      fixed: `let count = 1;
while (count <= 3) {
  console.log(count);
  count++;
}`,
      hint: "🔄 Infinite loop! You need to increment 'count' inside the loop (count++ or count = count + 1)",
      expectedOutput: "1\n2\n3"
    },
    {
      broken: `// 🐞 Multiply and log (string vs number issue)
let price = "10";
let quantity = 3;
let total = price * quantity;
console.log("Total: " + total);`,
      fixed: `let price = 10;
let quantity = 3;
let total = price * quantity;
console.log("Total: " + total);`,
      hint: "🧮 Price is a string \"10\" but multiplication works anyway. Real bug? Try using Number(price) or remove quotes. The fix makes it a number for clarity.",
      expectedOutput: "Total: 30"
    },
    {
      broken: `// 🐞 Function expression (missing semicolon and wrong variable)
const sayHi = function() {
  return "Hi there!"
}
console.log(sayHi)`,
      fixed: `const sayHi = function() {
  return "Hi there!";
};
console.log(sayHi());`,
      hint: "🎯 Two errors: missing semicolon after function expression, and you need to CALL sayHi() not just sayHi",
      expectedOutput: "Hi there!"
    },
    {
      broken: `// 🐞 If statement (using assignment instead of comparison)
let age = 18;
if (age = 18) {
  console.log("You are 18");
}`,
      fixed: `let age = 18;
if (age === 18) {
  console.log("You are 18");
}`,
      hint: "⚠️ = is assignment, === is comparison. Use === to check equality!",
      expectedOutput: "You are 18"
    },
    {
      broken: `// 🐞 Object property access (missing quotes)
let person = { name: "Alice", age: 25 };
console.log(person[name]);`,
      fixed: `let person = { name: "Alice", age: 25 };
console.log(person["name"]); // or person.name`,
      hint: "🔑 To access property 'name', use person.name or person['name'] (with quotes). person[name] looks for variable 'name'",
      expectedOutput: "Alice"
    }
  ];

  let currentChallenge = null;

  function loadNewChallenge() {
    const randomIndex = Math.floor(Math.random() * challenges.length);
    currentChallenge = challenges[randomIndex];
    document.getElementById('codeEditor').value = currentChallenge.broken;
    document.getElementById('outputArea').innerHTML = '// New challenge! Fix the bug and click RUN';
  }

  function runCode() {
    if (!currentChallenge) {
      loadNewChallenge();
      return;
    }
    const code = document.getElementById('codeEditor').value;
    const outputDiv = document.getElementById('outputArea');
    
    let output = '';
    let error = null;
    
    const originalLog = console.log;
    console.log = function(...args) {
      output += args.map(arg => {
        if (typeof arg === 'object' && arg !== null) {
          try { return JSON.stringify(arg); } catch(e) { return String(arg); }
        }
        return String(arg);
      }).join(' ') + '\n';
      originalLog.apply(console, args);
    };
    
    try {
      const func = new Function(code);
      func();
      console.log = originalLog;
      
      const expectedRaw = currentChallenge.expectedOutput;
      let outputTrimmed = output.trim();
      // Handle multi-line expected outputs (like 1\n2\n3)
      const normalize = (str) => str.trim().split('\n').filter(l => l !== '').join('\n');
      const normalizedOutput = normalize(outputTrimmed);
      const normalizedExpected = normalize(expectedRaw);
      
      if (normalizedOutput === normalizedExpected) {
        outputDiv.innerHTML = `<span class="success">✅ PERFECT! 🎉 You fixed the bug!</span>\n\n📤 Your output:\n${output || '(empty)'}\n<span class="success">Great job! Click NEW for another challenge.</span>`;
      } else {
        outputDiv.innerHTML = `<span>📤 Your Output:</span>\n${output || '(no output)'}\n\n<span style="color: #f59e0b;">❌ Not quite right.</span>\n<span>🎯 Expected:</span> "${expectedRaw}"\n\n💡 Click HINT for help!`;
      }
    } catch (err) {
      console.log = originalLog;
      let friendlyError = err.message;
      if (friendlyError.includes("Unexpected end of input")) {
        friendlyError = "SyntaxError: Missing closing parenthesis, bracket, or curly brace!";
      } else if (friendlyError.includes("is not defined")) {
        friendlyError = "ReferenceError: " + friendlyError + " — check variable spelling!";
      } else if (friendlyError.includes("Unexpected token")) {
        friendlyError = "SyntaxError: Maybe missing semicolon, comma, or bracket? Look carefully!";
      }
      outputDiv.innerHTML = `<span class="error">❌ ERROR: ${friendlyError}</span>\n\n💡 Click HINT for help fixing this!`;
    }
  }

  function showHint() {
    if (currentChallenge) {
      document.getElementById('hintMessage').innerHTML = currentChallenge.hint;
      document.getElementById('hintModal').style.display = 'flex';
    }
  }

  function giveUp() {
    if (currentChallenge) {
      document.getElementById('answerMessage').innerHTML = `<strong>✅ The correct fixed code:</strong><br><br><code style="background:#1a2a3a; padding:0.5rem; display:block; border-radius:8px; text-align:left;">${escapeHtml(currentChallenge.fixed)}</code><br><br><strong>Expected output:</strong> "${currentChallenge.expectedOutput}"<br><br>Study the fix and try the next challenge!`;
      document.getElementById('answerModal').style.display = 'flex';
    }
  }

  function escapeHtml(str) {
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  function closeModal() {
    document.getElementById('hintModal').style.display = 'none';
  }

  function closeAnswerModal() {
    document.getElementById('answerModal').style.display = 'none';
    loadNewChallenge();
  }

  // Initialize first challenge
  loadNewChallenge();
</script>
</body>
</html>
